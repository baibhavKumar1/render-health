name: Keep WebSocket Relay Warm

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint and Measure Response Time
        run: |
          echo "Pinging server health endpoint..."
          # Use curl to request header and write out total time in seconds
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" "https://render-health-rbx3.onrender.com/health")
          echo "Server responded in $RESPONSE_TIME seconds"
