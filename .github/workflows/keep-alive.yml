name: Keep WebSocket Relay Warm

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Required to allow writing/committing logs back to repo

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ping Health Endpoint and Measure Response Time
        run: |
          echo "Pinging server health endpoint..."
          # Configure target URL (use env var or fallback to placeholder)
          TARGET_URL="${{ secrets.RENDER_URL }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="https://render-health-rbx3.onrender.com/health"
          fi
          
          # Use curl -f flag so it fails (non-zero exit code) on HTTP errors (e.g. 404, 500)
          # Use -w "%{http_code} | %{time_total}s" to capture status code and duration
          RESULT=$(curl -f -s -o /dev/null -w "%{http_code} | %{time_total}" "$TARGET_URL")
          EXIT_CODE=$?
          
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          if [ $EXIT_CODE -ne 0 ]; then
            LOG_LINE="$TIMESTAMP | FAILED | Exit Code: $EXIT_CODE | URL: $TARGET_URL"
            echo "$LOG_LINE" >> ping_logs.txt
            echo "Error: Ping failed!"
            exit $EXIT_CODE
          else
            STATUS_CODE=$(echo "$RESULT" | cut -d'|' -f1 | tr -d ' ')
            DURATION=$(echo "$RESULT" | cut -d'|' -f2 | tr -d ' ')
            LOG_LINE="$TIMESTAMP | SUCCESS | HTTP: $STATUS_CODE | Time: ${DURATION}s | URL: $TARGET_URL"
            echo "$LOG_LINE" >> ping_logs.txt
            echo "$LOG_LINE"
          fi

      - name: Commit and Push Log Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add ping_logs.txt
          git commit -m "chore: update ping logs [skip ci]" || echo "No changes to commit"
          git push
