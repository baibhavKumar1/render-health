name: Keep WebSocket Relay Warm

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest

    env:
      GIT_USER: ${{ github.actor }}
      GIT_EMAIL: ${{ secrets.GIT_EMAIL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ping Health Endpoint and Measure Response Time
        run: |
          echo "Pinging server health endpoint..."

          TARGET_URL="${{ secrets.RENDER_URL }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="https://render-health-rbx3.onrender.com/health"
          fi

          RESULT=$(curl -f -s -o /dev/null -w "%{http_code}|%{time_total}" "$TARGET_URL")
          EXIT_CODE=$?

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          if [ $EXIT_CODE -ne 0 ]; then
            LOG_LINE="$TIMESTAMP | FAILED | Exit Code: $EXIT_CODE | URL: $TARGET_URL"
            echo "$LOG_LINE" >> ping_logs.txt
            echo "Error: Ping failed!"
            exit $EXIT_CODE
          else
            STATUS_CODE=$(echo "$RESULT" | cut -d'|' -f1)
            DURATION=$(echo "$RESULT" | cut -d'|' -f2)
            LOG_LINE="$TIMESTAMP | SUCCESS | HTTP: $STATUS_CODE | Time: ${DURATION}s | URL: $TARGET_URL"
            echo "$LOG_LINE" >> ping_logs.txt
            echo "$LOG_LINE"
          fi

      - name: Commit and Push Log Changes
        run: |
          git config --global user.name "$GIT_USER"
          git config --global user.email "$GIT_EMAIL"

          git add ping_logs.txt

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore: update ping logs [skip ci]"
          git push
