services:
  - type: web
    name: websocket-relay
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
        placeholder: "https://your-nextjs-app.vercel.app,http://localhost:3000"
      - key: SHARED_API_KEY
        sync: false
        generateValue: true
      - key: CLIENT_AUTH_TOKEN
        sync: false
        generateValue: true
